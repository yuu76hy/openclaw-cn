name: Build Windows Portable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.23.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "v$(node -p "require('./package.json').version")"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Build UI
        run: pnpm ui:build

      - name: Download Node.js portable
        shell: pwsh
        run: |
          $nodeVersion = "v22.12.0"
          $nodeUrl = "https://nodejs.org/dist/$nodeVersion/node-$nodeVersion-win-x64.zip"
          Invoke-WebRequest -Uri $nodeUrl -OutFile "node.zip"
          Expand-Archive -Path "node.zip" -DestinationPath "node-temp"
          Move-Item -Path "node-temp/node-$nodeVersion-win-x64" -Destination "node-portable"
          Remove-Item -Path "node.zip", "node-temp" -Recurse -Force

      - name: Create portable package
        shell: pwsh
        run: |
          $portableDir = "openclaw-cn-portable"
          New-Item -ItemType Directory -Force -Path $portableDir
          
          Copy-Item -Recurse -Force "dist" "$portableDir/"
          Copy-Item -Recurse -Force "node_modules" "$portableDir/"
          Copy-Item -Force "package.json" "$portableDir/"
          Copy-Item -Recurse -Force "skills" "$portableDir/"
          Copy-Item -Recurse -Force "node-portable" "$portableDir/node"

      - name: Create launch scripts
        shell: pwsh
        run: |
          $portableDir = "openclaw-cn-portable"
          
          $cmdContent = @"
          @echo off
          setlocal
          set "SCRIPT_DIR=%~dp0"
          set "NODE_PATH=%SCRIPT_DIR%node"
          set "PATH=%NODE_PATH%;%PATH%"
          "%NODE_PATH%\node.exe" "%SCRIPT_DIR%dist\entry.js" %*
          endlocal
          "@
          Set-Content -Path "$portableDir/openclaw-cn.cmd" -Value $cmdContent -Encoding ASCII
          
          $ps1Content = @"
          `$ScriptDir = Split-Path -Parent `$MyInvocation.MyCommand.Path
          `$env:PATH = "`$ScriptDir\node;`$env:PATH"
          & "`$ScriptDir\node\node.exe" "`$ScriptDir\dist\entry.js" @args
          "@
          Set-Content -Path "$portableDir/openclaw-cn.ps1" -Value $ps1Content -Encoding UTF8

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Compress-Archive -Path "openclaw-cn-portable" -DestinationPath "openclaw-cn-$version-win-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-cn-windows
          path: openclaw-cn-*.zip

      - name: Create Release
        if: github.event_name == 'push' || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: OpenClaw CN ${{ steps.version.outputs.version }}
          files: openclaw-cn-*.zip
          body: |
            ## OpenClaw CN ${{ steps.version.outputs.version }}
            
            ### 下载说明
            - `openclaw-cn-*-win-x64.zip` - 便携版（包含 Node.js 运行时，解压即用）
            
            ### 使用方法
            1. 下载并解压 `openclaw-cn-*-win-x64.zip`
            2. 双击运行 `openclaw-cn.cmd` 或在 PowerShell 中运行 `.\openclaw-cn.ps1`
            
            ### 快速开始
            ```bash
            # 运行安装向导
            openclaw-cn.cmd onboard --install-daemon
            
            # 启动网关
            openclaw-cn.cmd gateway --port 18789 --verbose
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
