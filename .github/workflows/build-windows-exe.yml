name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        default: ''

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.23.0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Get version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "v$(node -p "require('./package.json').version")"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Building version: $version"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Build UI
        run: pnpm ui:build

      - name: Install esbuild
        run: pnpm add -wD esbuild

      - name: Bundle with esbuild
        run: pnpm exec esbuild dist/entry.js --bundle --platform=node --format=cjs --outfile=dist/bundle.cjs --external:better-sqlite3 --external:@napi-rs/canvas --external:node-llama-cpp --external:sharp --external:fsevents --external:@lydell/node-pty --external:playwright-core --external:@mariozechner/clipboard-win32-x64-msvc --external:*.node --allow-overwrite

      - name: Install pkg
        run: npm install -g @yao-pkg/pkg

      - name: Build EXE
        run: pkg dist/bundle.cjs --targets node22-win-x64 --output dist/openclaw-cn.exe --compress GZip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-cn-windows
          path: dist/openclaw-cn.exe

      - name: Create Release
        if: github.event_name == 'push' || github.event.inputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: OpenClaw CN ${{ steps.version.outputs.version }}
          files: dist/openclaw-cn.exe
          body: |
            ## OpenClaw CN ${{ steps.version.outputs.version }}
            
            ### 下载说明
            - `openclaw-cn.exe` - 可执行文件
            
            ### 使用方法
            直接运行 `openclaw-cn.exe`
            
            ### 快速开始
            ```bash
            # 运行安装向导
            openclaw-cn.exe onboard --install-daemon
            
            # 启动网关
            openclaw-cn.exe gateway --port 18789 --verbose
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
